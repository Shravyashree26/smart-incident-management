services:

  postgres:
    image: postgres:16
    restart: unless-stopped

    environment:
      POSTGRES_DB: smart_ims
      POSTGRES_USER: postgre
      POSTGRES_PASSWORD: shravya26

    volumes:
      - smartims-postgres-data:/var/lib/postgresql/data

    networks:
      - smartims-network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgre -d smart_ims"]
      interval: 10s
      timeout: 5s
      retries: 10


  backend:

    image: shravyagowda/smart-incident-management-backend:latest

    restart: unless-stopped

    environment:

      DB_URL: jdbc:postgresql://postgres:5432/smart_ims
      DB_USERNAME: postgre
      DB_PASSWORD: shravya26

      JWT_SECRET: SmartIncidentManagementJwtSecretKeyMustBeAtLeast32CharactersLong2026
      JWT_EXPIRATION: 3600000

      FRONTEND_LOGIN_URL: http://13.204.88.23:5178/login

    ports:
      - "8081:8081"

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - smartims-network



  frontend:

    image: shravyagowda/smart-incident-management-frontend:latest

    restart: unless-stopped

    ports:
      - "5178:80"

    depends_on:
      - backend

    networks:
      - smartims-network



  prometheus:

    image: prom/prometheus:latest

    container_name: smartims-prometheus

    restart: unless-stopped

    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro

    ports:
      - "9092:9090"

    networks:
      - smartims-network

    depends_on:
      - backend



  grafana:

    image: grafana/grafana:latest

    container_name: smartims-grafana

    restart: unless-stopped

    ports:
      - "3002:3000"

    volumes:
      - smartims-grafana-data:/var/lib/grafana

    networks:
      - smartims-network

    depends_on:
      - prometheus



volumes:

  smartims-postgres-data:

  smartims-grafana-data:



networks:

  smartims-network:

    driver: bridge
